<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue CDN Clicker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 24px;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 16px;
        max-width: 320px;
      }
      button {
        padding: 8px 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app" class="card">
      <h2>Кликер (CDN)</h2>
      <p>Очки: {{ count }}</p>
      <button @click="increment">+1</button>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      const { createApp } = Vue

      createApp({
        data() {
          return {
            count: 0
          }
        },
        methods: {
          increment() {
            this.count += 1
          }
        }
      }).mount('#app')
    </script>
  </body>
</html>
